# jspect analyze config
# Format: key = value, blank line between rules, # for comments
# Fields: name, category, severity (info|medium|high|critical), pattern (Go RE2 regex)
# Run: jspect <file> --analyze
# Edit this file to add your own rules — no recompile needed.

name     = API Endpoint
category = Endpoints
severity = info
pattern  = ["`'](/(?:api|v[0-9]+|graphql|rest|gql|auth|oauth|admin|internal|private|public|user|account|profile|login|logout|signup|register|upload|download|search|query|config|settings|health|status|metrics|debug|token|refresh|reset|verify|confirm|webhook|callback|redirect)[^"`'\s]*)

name     = HTTP Call Endpoint
category = Endpoints
severity = info
pattern  = (?:fetch|axios(?:\.[a-z]+)?|\$\.(?:get|post|ajax)|\.(?:get|post|put|patch|delete|request)|\.open)\s*\(\s*[`"']([^`"']+)[`"']

name     = URL Key Endpoint
category = Endpoints
severity = info
pattern  = url\s*[:=]\s*["`']([^"`']+)["`']

name     = Template Literal Path
category = Endpoints
severity = info
pattern  = `(/[a-zA-Z0-9_\-]+(?:/(?:\$\{[^}]+\}|[a-zA-Z0-9_\-]+))*)`

name     = Relative Path
category = Endpoints
severity = info
pattern  = ["`'](/[a-zA-Z0-9_\-]+(?:/[a-zA-Z0-9_\-]+){1,})["`']

name     = Absolute URL
category = URLs
severity = info
pattern  = https?://[^\s"`'<>\]\)\[,;}{]+

name     = WebSocket URL
category = URLs
severity = medium
pattern  = wss?://[^\s"`'<>)\]]+

name     = S3 Bucket
category = URLs
severity = high
pattern  = (?i)https?://[a-z0-9\-\.]+\.s3[\.\-][a-z0-9\-]+\.amazonaws\.com[^\s"`']*

name     = Azure Blob
category = URLs
severity = high
pattern  = (?i)https?://[a-z0-9]+\.blob\.core\.windows\.net[^\s"`']*

name     = GCS Bucket
category = URLs
severity = high
pattern  = (?i)https?://storage\.googleapis\.com/[^\s"`']+

name     = GraphQL Operation
category = GraphQL
severity = info
pattern  = (?i)(?:query|mutation|subscription)\s+\w+\s*[({]

name     = GraphQL Endpoint
category = GraphQL
severity = medium
pattern  = (?i)["`'][^"`']*(?:graphql|/gql)[^"`']*["`']

name     = JWT Token
category = Credentials
severity = high
pattern  = eyJ[A-Za-z0-9_-]{10,}\.eyJ[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}

name     = Generic API Key
category = Credentials
severity = high
pattern  = (?i)(?:api[_\-]?key|apikey|api_secret|app[_\-]?key|access[_\-]?key|secret[_\-]?key|client[_\-]?secret|auth[_\-]?token)\s*[=:]\s*["`']([A-Za-z0-9_\-\.]{16,64})["`']

name     = Password in Source
category = Credentials
severity = critical
pattern  = (?i)(?:password|passwd|pwd)\s*[=:]\s*["`']([^"`']{4,})["`']

name     = Basic Auth in URL
category = Credentials
severity = critical
pattern  = https?://[^:@/\s]+:[^@/\s]+@[^\s"`']+

name     = AWS Access Key ID
category = Cloud Keys
severity = critical
pattern  = AKIA[0-9A-Z]{16}

name     = Google API Key
category = Cloud Keys
severity = critical
pattern  = AIza[0-9A-Za-z_\-]{35}

name     = Firebase URL
category = Cloud Keys
severity = high
pattern  = https://[a-z0-9\-]+\.firebaseio\.com

name     = Stripe Live Key
category = Cloud Keys
severity = critical
pattern  = (?:pk|sk|rk)_live_[0-9a-zA-Z]{24,}

name     = Stripe Test Key
category = Cloud Keys
severity = medium
pattern  = (?:pk|sk|rk)_test_[0-9a-zA-Z]{24,}

name     = Slack Token
category = Cloud Keys
severity = high
pattern  = xox[baprs]-[0-9A-Za-z\-]{10,}

name     = GitHub Token
category = Cloud Keys
severity = critical
pattern  = ghp_[0-9a-zA-Z]{36}

name     = SendGrid Key
category = Cloud Keys
severity = critical
pattern  = SG\.[0-9A-Za-z_\-]{22}\.[0-9A-Za-z_\-]{43}

name     = Twilio SID
category = Cloud Keys
severity = high
pattern  = AC[a-z0-9]{32}

name     = IPv4 Address
category = Network
severity = info
pattern  = \b(?:(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\b

name     = Private IP
category = Network
severity = medium
pattern  = \b(?:10\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}|172\.(?:1[6-9]|2[0-9]|3[01])\.[0-9]{1,3}\.[0-9]{1,3}|192\.168\.[0-9]{1,3}\.[0-9]{1,3})\b

name     = Debug Statement
category = Debug
severity = info
pattern  = (?i)(?:console\.log|debugger|console\.debug|console\.warn)\s*\(

name     = Interesting Comment
category = Debug
severity = medium
pattern  = (?:^|[;{}\s])//(?://)?\s*(?i)(?:todo|fixme|hack|bug|password|secret|key|token|admin|debug|temp|hardcode|credential|vulnerable|unsafe|internal)[^\n]*

# ── Add your own rules below ─────────────────────────────────────────────
# Example:
# name     = Internal Header
# category = Custom
# severity = high
# pattern  = X-Internal-[A-Za-z]+:\s*[\w\-]+
